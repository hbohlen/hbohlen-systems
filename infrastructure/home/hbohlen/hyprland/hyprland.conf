# Hyprland Configuration File
# This file contains additional Hyprland configuration that extends the base settings

# Environment variables for NVIDIA compatibility
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1

# Additional NVIDIA optimizations
env = WLR_DRM_NO_ATOMIC,1
env = WLR_RENDERER_ALLOW_SOFTWARE,1

# Workspace rules - enhanced for better management
workspace = 1, monitor:DP-1, default:true
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1
workspace = 6, monitor:DP-1
workspace = 7, monitor:DP-1
workspace = 8, monitor:DP-1
workspace = 9, monitor:DP-1

# Window rules - enhanced for better window management
windowrule = float, ^(pavucontrol)$
windowrule = float, ^(blueman-manager)$
windowrule = float, ^(nm-connection-editor)$
windowrule = float, ^(file_progress)$
windowrule = float, ^(confirm)$
windowrule = float, ^(dialog)$
windowrule = float, ^(download)$
windowrule = float, ^(notification)$
windowrule = float, ^(error)$
windowrule = float, ^(splash)$
windowrule = float, ^(confirmreset)$
windowrule = float, title:^(Open File)(.*)$
windowrule = float, title:^(Select a File)(.*)$
windowrule = float, title:^(Choose wallpaper)(.*)$
windowrule = float, title:^(Open Folder)(.*)$
windowrule = float, title:^(Save As)(.*)$
windowrule = float, title:^(Library)(.*)$

# Additional window management rules
windowrule = center, ^(pavucontrol)$
windowrule = center, ^(blueman-manager)$
windowrule = center, ^(nm-connection-editor)$
windowrule = size 800 600, ^(pavucontrol)$
windowrule = size 600 500, ^(blueman-manager)$
windowrule = size 700 500, ^(nm-connection-editor)$

# Tiling rules for better window management
windowrule = tile, ^(kitty)$
windowrule = tile, ^(vivaldi-stable)$
windowrule = tile, ^(code)$
windowrule = tile, ^(firefox)$

# Opacity rules for inactive windows
windowrule = opacity 0.95 0.85, ^(kitty)$
windowrule = opacity 1.0 0.9, ^(vivaldi-stable)$

# Focus rules
windowrule = noinitialfocus, ^(steam)$
windowrule = stayfocused, ^(fuzzel)$

# Startup applications with proper systemd integration and greetd compatibility
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP PATH XDG_DATA_DIRS
exec-once = systemctl --user start hyprland-session.target

# Additional environment setup for greetd compatibility
exec-once = systemctl --user import-environment DISPLAY XAUTHORITY
exec-once = hash dbus-update-activation-environment 2>/dev/null && dbus-update-activation-environment --systemd --all