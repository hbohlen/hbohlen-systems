# Hyprland Configuration File
# This file contains additional Hyprland configuration that extends the base settings

# Environment variables for NVIDIA compatibility
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1

# Additional NVIDIA optimizations
env = WLR_DRM_NO_ATOMIC,1
env = WLR_RENDERER_ALLOW_SOFTWARE,1

# Enhanced workspace rules with specific layouts and settings
workspace = 1, monitor:DP-1, default:true, layoutopt:orientation:left
workspace = 2, monitor:DP-1, layoutopt:orientation:left
workspace = 3, monitor:DP-1, layoutopt:orientation:top
workspace = 4, monitor:DP-1, layoutopt:orientation:left
workspace = 5, monitor:DP-1, layoutopt:orientation:left
workspace = 6, monitor:DP-1, layoutopt:orientation:left
workspace = 7, monitor:DP-1, layoutopt:orientation:left
workspace = 8, monitor:DP-1, layoutopt:orientation:left
workspace = 9, monitor:DP-1, layoutopt:orientation:left

# Default workspace assignments for applications
windowrulev2 = workspace 1, class:^(kitty)$
windowrulev2 = workspace 2, class:^(vivaldi-stable)$
windowrulev2 = workspace 2, class:^(firefox)$
windowrulev2 = workspace 2, class:^(chromium)$
windowrulev2 = workspace 3, class:^(code)$
windowrulev2 = workspace 3, class:^(code-oss)$
windowrulev2 = workspace 3, class:^(VSCodium)$
windowrulev2 = workspace 4, class:^(discord)$
windowrulev2 = workspace 4, class:^(slack)$
windowrulev2 = workspace 4, class:^(teams)$
windowrulev2 = workspace 5, class:^(thunar)$
windowrulev2 = workspace 5, class:^(nautilus)$
windowrulev2 = workspace 5, class:^(dolphin)$
windowrulev2 = workspace 6, class:^(gimp)$
windowrulev2 = workspace 6, class:^(inkscape)$
windowrulev2 = workspace 6, class:^(blender)$
windowrulev2 = workspace 7, class:^(steam)$
windowrulev2 = workspace 8, class:^(obs)$
windowrulev2 = workspace 9, class:^(spotify)$
windowrulev2 = workspace 9, class:^(vlc)$

# System dialog and utility window rules (always float)
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(file_progress)$
windowrulev2 = float, class:^(confirm)$
windowrulev2 = float, class:^(dialog)$
windowrulev2 = float, class:^(download)$
windowrulev2 = float, class:^(notification)$
windowrulev2 = float, class:^(error)$
windowrulev2 = float, class:^(splash)$
windowrulev2 = float, class:^(confirmreset)$
windowrulev2 = float, class:^(xdg-desktop-portal-gtk)$
windowrulev2 = float, class:^(polkit-gnome-authentication-agent-1)$
windowrulev2 = float, title:^(Open File)(.*)$
windowrulev2 = float, title:^(Select a File)(.*)$
windowrulev2 = float, title:^(Choose wallpaper)(.*)$
windowrulev2 = float, title:^(Open Folder)(.*)$
windowrulev2 = float, title:^(Save As)(.*)$
windowrulev2 = float, title:^(Library)(.*)$
windowrulev2 = float, title:^(File Operation Progress)(.*)$

# Application-specific floating rules
windowrulev2 = float, class:^(calculator)$
windowrulev2 = float, class:^(gnome-calculator)$
windowrulev2 = float, class:^(galculator)$
windowrulev2 = float, class:^(qalculate-gtk)$
windowrulev2 = float, class:^(system-config-printer)$
windowrulev2 = float, class:^(gparted)$
windowrulev2 = float, class:^(timeshift-gtk)$
windowrulev2 = float, class:^(gnome-disks)$

# Positioning and sizing for floating windows
windowrulev2 = center, class:^(pavucontrol)$
windowrulev2 = center, class:^(blueman-manager)$
windowrulev2 = center, class:^(nm-connection-editor)$
windowrulev2 = center, class:^(calculator)$
windowrulev2 = center, class:^(gnome-calculator)$
windowrulev2 = center, class:^(galculator)$
windowrulev2 = center, class:^(qalculate-gtk)$

# Size rules for specific applications
windowrulev2 = size 800 600, class:^(pavucontrol)$
windowrulev2 = size 600 500, class:^(blueman-manager)$
windowrulev2 = size 700 500, class:^(nm-connection-editor)$
windowrulev2 = size 400 300, class:^(calculator)$
windowrulev2 = size 400 300, class:^(gnome-calculator)$
windowrulev2 = size 400 300, class:^(galculator)$
windowrulev2 = size 500 400, class:^(qalculate-gtk)$
windowrulev2 = size 900 700, class:^(system-config-printer)$

# Explicit tiling rules for productivity applications
windowrulev2 = tile, class:^(kitty)$
windowrulev2 = tile, class:^(vivaldi-stable)$
windowrulev2 = tile, class:^(firefox)$
windowrulev2 = tile, class:^(chromium)$
windowrulev2 = tile, class:^(code)$
windowrulev2 = tile, class:^(code-oss)$
windowrulev2 = tile, class:^(VSCodium)$
windowrulev2 = tile, class:^(thunar)$
windowrulev2 = tile, class:^(nautilus)$
windowrulev2 = tile, class:^(dolphin)$
windowrulev2 = tile, class:^(discord)$
windowrulev2 = tile, class:^(slack)$
windowrulev2 = tile, class:^(teams)$

# Opacity rules for better visual hierarchy
windowrulev2 = opacity 0.95 0.85, class:^(kitty)$
windowrulev2 = opacity 1.0 0.9, class:^(vivaldi-stable)$
windowrulev2 = opacity 1.0 0.95, class:^(firefox)$
windowrulev2 = opacity 1.0 0.95, class:^(code)$
windowrulev2 = opacity 0.9 0.8, class:^(thunar)$
windowrulev2 = opacity 0.9 0.8, class:^(nautilus)$
windowrulev2 = opacity 0.9 0.8, class:^(dolphin)$

# Focus and behavior rules
windowrulev2 = noinitialfocus, class:^(steam)$
windowrulev2 = noinitialfocus, class:^(spotify)$
windowrulev2 = stayfocused, class:^(fuzzel)$
windowrulev2 = stayfocused, class:^(rofi)$
windowrulev2 = stayfocused, class:^(wofi)$

# Fullscreen rules for media applications
windowrulev2 = fullscreen, class:^(vlc)$, title:^(.*fullscreen.*)$
windowrulev2 = fullscreen, class:^(mpv)$

# Gaming-specific rules
windowrulev2 = fullscreen, class:^(steam_app_.*)$
windowrulev2 = immediate, class:^(steam_app_.*)$
windowrulev2 = noinitialfocus, class:^(steam_app_.*)$

# Picture-in-picture and special window handling
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin, title:^(Picture-in-Picture)$
windowrulev2 = size 400 225, title:^(Picture-in-Picture)$
windowrulev2 = move 75% 75%, title:^(Picture-in-Picture)$

# Development tool specific rules
windowrulev2 = float, class:^(gitk)$
windowrulev2 = float, class:^(git-gui)$
windowrulev2 = size 1000 700, class:^(gitk)$
windowrulev2 = size 800 600, class:^(git-gui)$

# Terminal-specific rules for different use cases
windowrulev2 = float, class:^(kitty)$, title:^(floating_terminal)$
windowrulev2 = size 800 500, class:^(kitty)$, title:^(floating_terminal)$
windowrulev2 = center, class:^(kitty)$, title:^(floating_terminal)$

# Startup applications with proper systemd integration and greetd compatibility
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP PATH XDG_DATA_DIRS
exec-once = systemctl --user start hyprland-session.target

# Additional environment setup for greetd compatibility
exec-once = systemctl --user import-environment DISPLAY XAUTHORITY
exec-once = hash dbus-update-activation-environment 2>/dev/null && dbus-update-activation-environment --systemd --all