# Hyprland Keybindings Configuration
# This file documents the keybindings implemented in home.nix
# All keybindings are now configured through home-manager settings

# ===== CORE APPLICATION KEYBINDINGS =====
# Super+Return     → Launch kitty terminal
# Super+Q          → Close focused window
# Super+Space      → Launch fuzzel application launcher

# ===== WORKSPACE MANAGEMENT =====
# Super+[1-9]      → Switch to workspace [1-9]
# Super+Shift+[1-9] → Move focused window to workspace [1-9]

# ===== WINDOW FOCUS MOVEMENT (VIM-LIKE) =====
# Super+H          → Focus window to the left
# Super+J          → Focus window below
# Super+K          → Focus window above  
# Super+L          → Focus window to the right

# ===== WINDOW MANAGEMENT =====
# Super+F          → Toggle fullscreen
# Super+Shift+Space → Toggle floating mode
# Super+P          → Toggle pseudotile
# Super+Shift+J    → Toggle split direction

# ===== WINDOW RESIZING =====
# Super+Alt+H      → Resize window left (-20px width)
# Super+Alt+L      → Resize window right (+20px width)
# Super+Alt+K      → Resize window up (-20px height)
# Super+Alt+J      → Resize window down (+20px height)

# ===== WINDOW MOVEMENT =====
# Super+Shift+H    → Move window left
# Super+Shift+L    → Move window right
# Super+Shift+K    → Move window up
# Super+Shift+J    → Move window down

# ===== MOUSE BINDINGS =====
# Super+Left Click  → Move window
# Super+Right Click → Resize window

# ===== SYSTEM MANAGEMENT =====
# Super+M          → Exit Hyprland
# Super+Shift+R    → Force renderer reload

# Note: All keybindings are implemented in the home-manager configuration
# at infrastructure/home/hbohlen/home.nix in the wayland.windowManager.hyprland.settings.bind section