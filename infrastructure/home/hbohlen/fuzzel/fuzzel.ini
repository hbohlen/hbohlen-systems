# Fuzzel Application Launcher Configuration
# This configuration provides a keyboard-driven application launcher
# integrated with the Hyprland desktop environment

[main]
# Terminal to use for terminal applications
terminal=kitty

# Layer to display fuzzel on (overlay ensures it appears above other windows)
layer=overlay

# Width as percentage of screen width
width=40

# Padding settings for better visual appearance
horizontal-pad=20
vertical-pad=10
inner-pad=10

# Font configuration
font=monospace:size=12

# DPI awareness for high-resolution displays
dpi-aware=yes

# Show application actions (like "Open", "Edit", etc.)
show-actions=yes

# Character to use for password fields
password-character=*

# Fields to search in (filename, name, generic name)
fields=filename,name,generic

# Enable fuzzy matching for better search results
fuzzy=yes

# Show recently used applications first
show-recent=yes

# Sort results by relevance
sort-result=yes

# Number of lines to display
lines=15

# Tab width for formatting
tabs=4

# Exit when focus is lost (clicking outside)
exit-on-keyboard-focus-loss=yes

[colors]
# Background color (dark theme)
background=1e1e2eff

# Text color (light)
text=cdd6f4ff

# Matching text highlight color (pink/red)
match=f38ba8ff

# Selection background color (gray)
selection=585b70ff

# Selected text color (light)
selection-text=cdd6f4ff

# Selected matching text color (pink/red)
selection-match=f38ba8ff

# Border color (blue)
border=b4befeff

[border]
# Border width in pixels
width=2

# Border radius for rounded corners (matches Hyprland theme)
radius=8

[key-bindings]
# Cancel/close fuzzel
cancel=Escape Control+c

# Execute selected application
execute=Return KP_Enter Control+m

# Execute or move to next match
execute-or-next=Tab

# Cursor movement
cursor-left=Left Control+b
cursor-left-word=Control+Left Mod1+b
cursor-right=Right Control+f
cursor-right-word=Control+Right Mod1+f
cursor-home=Home Control+a
cursor-end=End Control+e

# Text deletion
delete-prev=BackSpace
delete-prev-word=Mod1+BackSpace Control+BackSpace
delete-next=Delete
delete-next-word=Mod1+d Control+Delete
delete-line=Control+k

# Navigation through results
prev=Up Control+p
prev-page=Page_Up Control+v
next=Down Control+n
next-page=Page_Down Mod1+v
first=Control+Home
last=Control+End